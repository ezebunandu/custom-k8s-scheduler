---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphabetical-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alphabetical-scheduler
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/binding"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alphabetical-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alphabetical-scheduler
subjects:
  - kind: ServiceAccount
    name: alphabetical-scheduler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphabetical-scheduler
  namespace: kube-system
  labels:
    app: alphabetical-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alphabetical-scheduler
  template:
    metadata:
      labels:
        app: alphabetical-scheduler
    spec:
      serviceAccountName: alphabetical-scheduler
      containers:
        - name: scheduler
          image: alphabetical-scheduler:latest
          imagePullPolicy: IfNotPresent
