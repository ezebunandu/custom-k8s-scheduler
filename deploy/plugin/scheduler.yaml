---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphabetical-plugin-scheduler
  namespace: kube-system
---
# The kube-scheduler binary starts informers for many resource types beyond what
# system:kube-scheduler covers. This ClusterRole grants everything the binary's
# shared informer factory expects to list/watch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alphabetical-plugin-scheduler
rules:
  # Core scheduling resources
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/binding"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["", "events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Informer-watched core resources
  - apiGroups: [""]
    resources: ["namespaces", "services", "replicationcontrollers",
                "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Apps informers
  - apiGroups: ["apps"]
    resources: ["replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Policy informers
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # Storage informers
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csistoragecapacities",
                "csidrivers", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  # Dynamic Resource Allocation informers (k8s 1.31+)
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims", "resourceslices", "resourceclaimstatuses"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alphabetical-plugin-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alphabetical-plugin-scheduler
subjects:
  - kind: ServiceAccount
    name: alphabetical-plugin-scheduler
    namespace: kube-system
---
# Read the extension-apiserver-authentication ConfigMap in kube-system.
# The default scheduler gets this via a separate Role; we need our own.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alphabetical-plugin-scheduler-auth-reader
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["extension-apiserver-authentication"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alphabetical-plugin-scheduler-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alphabetical-plugin-scheduler-auth-reader
subjects:
  - kind: ServiceAccount
    name: alphabetical-plugin-scheduler
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alphabetical-plugin-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: false
      resourceName: alphabetical-plugin-scheduler
      resourceNamespace: kube-system
    profiles:
      - schedulerName: alphabetical-scheduler
        plugins:
          score:
            enabled:
              - name: AlphabeticalScore
                weight: 1
            disabled:
              - name: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphabetical-plugin-scheduler
  namespace: kube-system
  labels:
    app: alphabetical-plugin-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alphabetical-plugin-scheduler
  template:
    metadata:
      labels:
        app: alphabetical-plugin-scheduler
    spec:
      serviceAccountName: alphabetical-plugin-scheduler
      containers:
        - name: scheduler
          image: alphabetical-plugin-scheduler:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/scheduler/scheduler-config.yaml
          volumeMounts:
            - name: scheduler-config
              mountPath: /etc/scheduler
              readOnly: true
      volumes:
        - name: scheduler-config
          configMap:
            name: alphabetical-plugin-scheduler-config
